<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="/icon-dark.png">
<link rel="apple-touch-icon" href="/icon-dark.png">
<title>{{title}}</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <a class="nav-brand brand" href="/index.html">
    <span class="en">En</span><span class="cogni">cognition</span>
  </a>
  <a class="nav-back" href="/blog.html">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8.5 2.5L4 7l4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Blog
  </a>
</nav>

<!-- ══ HERO ══ -->
<section class="hero blog-post-hero">
  <div class="hero-glow"></div>
  <div class="hero-glow-blue"></div>

  <p class="hero-eyebrow">{{hero_eyebrow}}</p>

  <h1 class="hero-headline" id="post-title"></h1>

  <p class="hero-sub" id="post-meta"></p>
</section>

<hr class="section-divider">

<!-- ══ BEITRAG ══ -->
<div class="section reveal">
  <div class="blog-post-layout">
    <aside class="toc" id="toc"></aside>
    <article class="blog-prose" id="post-content"></article>
  </div>
</div>

{{> footer}}

<script src="/marked.min.js"></script>
<script src="/blog.js"></script>
<script src="/function.js"></script>
</body>
</html>
